      @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
      .input-error { border-color: #ef4444 !important; background-color: #fef2f2; animation: shake 0.3s; }
      @keyframes shake { 0%, 100% { transform: translateX(0); } 25%, 75% { transform: translateX(-4px); } 50% { transform: translateX(4px); } }
      
      /* Rich Text Styles for Result */
      .result-bold { font-weight: 800; color: #1e3a8a; } /* Blue-900 */
      
      /* Updated result-note: pre-wrap to keep spaces/newlines */
      .result-note { 
          background-color: #fffbeb; 
          border-left: 4px solid #f59e0b; 
          padding: 12px; 
          margin-top: 8px; 
          margin-bottom: 8px; 
          font-style: italic; 
          font-size: 0.95rem; 
          white-space: pre-wrap; 
          line-height: 1.5;
          color: #1f2937;
      }
      
      .result-note-blue { background-color: #eff6ff; border-left: 4px solid #2563eb; padding: 12px; margin-top: 8px; margin-bottom: 8px; color: #1e3a8a; font-weight: 800; white-space: pre-wrap; line-height: 1.6; }
      .result-ending-blue { color: #1e3a8a; font-weight: 800; white-space: pre-wrap; line-height: 1.6; margin-top: 10px; }
      .result-alert { background-color: #fef2f2; border-left: 4px solid #ef4444; padding: 12px; margin-top: 8px; margin-bottom: 8px; color: #b91c1c; font-weight: 700; white-space: pre-wrap; line-height: 1.6; }
      .result-highlight { background-color: #fff1f2; border: 2px solid #e11d48; padding: 12px; margin-top: 8px; margin-bottom: 8px; color: #be123c; font-weight: 700; border-radius: 6px; white-space: pre-wrap; line-height: 1.6; }

      .result-group-title { font-weight: 700; color: #1f2937; margin-bottom: 8px; }
      .result-group-body { padding-left: 16px; border-left: 2px solid #e5e7eb; }
      .section-divider { border-bottom: 4px solid #e5e7eb; margin-bottom: 1.5rem; padding-bottom: 1.5rem; }
      .question-block { background-color: #fff; border: 1px solid #e5e7eb; border-radius: 0.625rem; padding: 0.75rem; margin-bottom: 0.75rem; box-shadow: none; }
      .mobile-safe-bottom { padding-bottom: max(1rem, env(safe-area-inset-bottom)); }
      
      @media (max-width: 767px) {
        body { font-size: 12px; }
        .result-note, .result-note-blue, .result-alert, .result-highlight { font-size: 0.9rem; padding: 10px; }
        .result-header { font-size: 0.95rem; }
        .question-block { padding: 0.625rem; margin-bottom: 0.625rem; }
      }
      
      /* Print Styles */
      @media print {
        body { background-color: white; }
        header, footer, button { display: none !important; }
        .no-print { display: none; }
